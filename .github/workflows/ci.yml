name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      ENCRYPTION_KEY: test_fernet_key_PLACEHOLDER_000000000000000000000=
      JWT_SECRET: test_jwt_secret_please_change_in_prod_000000000000000000
      DATABASE_URL: postgresql+asyncpg://raijin:raijin@localhost:5432/raijin_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test_secret
      S3_BUCKET_INVOICES: test-invoices
      PYTHONPATH: ${{ github.workspace }}/shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install cryptography  # pour le shared.security
      - name: Generate valid Fernet key
        run: |
          echo "ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> $GITHUB_ENV
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest -q

  workers:
    name: Workers · lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./workers
    env:
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test_secret
      S3_BUCKET_INVOICES: test-invoices
      DATABASE_URL: postgresql+psycopg2://raijin:raijin@localhost:5432/raijin_test
      PYTHONPATH: ${{ github.workspace }}/shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: workers/pyproject.toml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Generate valid Fernet key
        run: |
          echo "ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> $GITHUB_ENV
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest -q

  frontend:
    name: Frontend · typecheck + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint

  e2e:
    name: E2E · Playwright golden paths
    runs-on: ubuntu-latest
    needs: [backend, workers, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install frontend deps
        working-directory: ./frontend
        run: npm install --no-audit --no-fund
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      - name: Prepare stack .env
        run: |
          cp .env.example .env
          echo "" >> .env
          echo "ENCRYPTION_KEY=$(python3 -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> .env
          echo "RATE_LIMIT_LOGIN_PER_MIN=1000" >> .env
          echo "RATE_LIMIT_REGISTER_PER_MIN=1000" >> .env
      - name: Start stack
        run: docker compose up -d --build backend worker beat frontend postgres redis minio
      - name: Wait for backend & frontend
        run: |
          for _ in $(seq 1 60); do
            curl -sf http://localhost:6200/health && curl -sf http://localhost:6100 && exit 0
            sleep 3
          done
          echo "stack didn't come up"; docker compose logs --tail=200; exit 1
      - name: Apply DB migrations
        run: docker compose exec -T backend alembic upgrade head
      - name: Run Playwright
        working-directory: ./frontend
        env:
          E2E_BASE_URL: http://localhost:6100
          E2E_API_URL: http://localhost:6200
          CI: "1"
        run: npm run e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=500

  docker-build:
    name: Docker · build images
    runs-on: ubuntu-latest
    needs: [backend, workers, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build workers
        uses: docker/build-push-action@v5
        with:
          context: ./workers
          push: false
          cache-from: type=gha,scope=workers
          cache-to: type=gha,mode=max,scope=workers
      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: runner
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
